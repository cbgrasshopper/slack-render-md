name: Deploy Web Renderer

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "deno.jsonc"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/deployctl@v1
        with:
          project: slack-render-md
          entrypoint: web/main.ts
