<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} - slack-render-md</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" media="(prefers-color-scheme: light)">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
      background: #fff;
      color: #1f2328;
    }
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #f6f8fa;
      border-bottom: 1px solid #d0d7de;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #656d76;
      max-width: 60%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .header a {
      font-size: 12px;
      color: #0969da;
      text-decoration: none;
    }
    .header a:hover { text-decoration: underline; }
    .markdown-body {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    .markdown-body pre { border-radius: 6px; }
    .markdown-body pre code.hljs {
      background: transparent;
      padding: 16px;
      font-size: 13px;
    }
    .markdown-body .mermaid {
      text-align: center;
      margin: 16px 0;
      padding: 16px;
      background: #f6f8fa;
      border-radius: 6px;
    }
    .markdown-body .katex-display {
      margin: 16px 0;
      overflow-x: auto;
      overflow-y: hidden;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0d1117; color: #e6edf3; }
      .header { background: #161b22; border-bottom-color: #30363d; }
      .header h1 { color: #8b949e; }
      .markdown-body .mermaid { background: #161b22; }
    }
    @media (max-width: 600px) {
      .markdown-body { padding: 16px; }
      .header { padding: 8px 16px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 title="{{TITLE}}">{{TITLE}}</h1>
    <a href="slack://open" onclick="window.close(); return false;">Close</a>
  </div>
  <div class="markdown-body">
    {{CONTENT}}
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('pre code[class*="language-"]').forEach((block) => {
        hljs.highlightElement(block);
      });
      mermaid.initialize({ startOnLoad: true, theme: 'default' });
      try {
        renderMathInElement(document.body, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$', right: '$', display: false },
            { left: '\\[', right: '\\]', display: true },
            { left: '\\(', right: '\\)', display: false },
          ],
          throwOnError: false,
        });
      } catch {}
    });
  </script>
</body>
</html>
